[package]
name = "turbomcp4-client"
version = "4.0.0-alpha.1"
edition = "2024"
rust-version = "1.85"
authors = ["Nicholas Paterno <nick@epistates.com>"]
description = "TurboMCP v4 client: ClientBuilder, ConnectMode probe, MRTR loop, cache layer."
license = "MIT"
repository = "https://github.com/Epistates/turbomcp"
homepage = "https://turbomcp.org"

[features]
# The Streamable HTTP client transport (reqwest + SSE). Off by default; stdio
# needs no extra deps.
http = ["dep:reqwest", "dep:eventsource-stream", "dep:futures"]

[dependencies]
turbomcp4-core = { workspace = true, features = ["std"] }
turbomcp4-protocol = { workspace = true }
turbomcp4-codec = { workspace = true }
turbomcp4-service = { workspace = true }
turbomcp4-transport-stdio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "time", "process", "io-util", "macros"] }
reqwest = { workspace = true, optional = true }
eventsource-stream = { workspace = true, optional = true }
futures = { workspace = true, optional = true }

[dev-dependencies]
turbomcp4-server = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "io-util"] }
