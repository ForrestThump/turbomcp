[package]
name = "turbomcp4-transport-http"
version = "4.0.0-alpha.1"
edition = "2024"
rust-version = "1.85"
authors = ["Nicholas Paterno <nick@epistates.com>"]
description = "TurboMCP v4 Streamable HTTP transport (axum)."
license = "MIT"
repository = "https://github.com/Epistates/turbomcp"
homepage = "https://turbomcp.org"

[dependencies]
turbomcp4-core = { workspace = true }
turbomcp4-codec = { workspace = true }
turbomcp4-service = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
tokio = { workspace = true, features = ["rt", "net"] }
bytes = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
turbomcp4-protocol = { workspace = true }
turbomcp4-server = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "net", "macros", "time"] }
tower = { workspace = true, features = ["util"] }
http-body-util = "0.1"
reqwest = { workspace = true }
