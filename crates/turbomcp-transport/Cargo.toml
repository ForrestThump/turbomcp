[package]
name = "turbomcp-transport"
version = "3.1.4"
edition = "2024"
authors = ["Nicholas Paterno <nick@epistates.com>"]
description = "Multi-protocol transport layer supporting HTTP, WebSocket, STDIO, and TCP for MCP communications"
license = "MIT"
repository = "https://github.com/Epistates/turbomcp"
homepage = "https://turbomcp.org"
keywords = ["mcp", "transport", "http", "websocket", "networking"]
categories = ["network-programming", "asynchronous"]
readme = "README.md"
rust-version = "1.89.0"

[dependencies]
# Core dependencies
turbomcp-protocol = { workspace = true }
turbomcp-transport-traits = { workspace = true }
# Individual transport crates
turbomcp-stdio = { workspace = true, optional = true }
turbomcp-http = { workspace = true, optional = true }
turbomcp-websocket = { workspace = true, optional = true }
turbomcp-tcp = { workspace = true, optional = true }
turbomcp-unix = { workspace = true, optional = true }
tokio = { workspace = true, features = ["net", "io-std", "io-util", "process", "sync", "time", "fs"] }
tokio-util = { workspace = true, features = ["codec", "io"] }
futures = { workspace = true }
pin-project-lite = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Compression (optional)
flate2 = { version = "1.1", optional = true }
brotli = { version = "8.0.2", optional = true }
lz4_flex = { version = "0.13", optional = true }

# TLS support (optional)
rustls = { version = "0.23", optional = true }
tokio-rustls = { version = "0.26", optional = true }

# Observability
tracing = { workspace = true }
metrics = { workspace = true, optional = true }

subtle = { workspace = true }
sha2 = { workspace = true }
# Wipe API keys from memory on Drop
zeroize = "1.8"

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
url = { workspace = true }
ahash = { workspace = true }
parking_lot = { workspace = true }
arc-swap = { workspace = true }
dashmap = { workspace = true }
fastrand = { workspace = true }
rand = { workspace = true }

# Development utilities
wiremock = { version = "0.6", optional = true }

[dev-dependencies]
axum = { workspace = true }
criterion = { workspace = true }
tokio-test = { workspace = true }
pretty_assertions = { workspace = true }
serial_test = { workspace = true }
tempfile = { workspace = true }
proptest = { workspace = true }
reqwest = { workspace = true }
tokio-tungstenite = { workspace = true }

[features]
default = ["stdio"]

# Core transports
stdio = ["dep:turbomcp-stdio"]
http = ["dep:turbomcp-http"]
websocket = ["dep:turbomcp-websocket"]
tcp = ["dep:turbomcp-tcp", "tokio/net"]
unix = ["dep:turbomcp-unix", "tokio/net"]

# Compression support
compression = ["flate2", "brotli", "lz4_flex"]

# TLS support
tls = ["rustls", "tokio-rustls"]

# Legacy feature aliases retained for downstream compatibility. Authentication
# for HTTP servers lives in `turbomcp-server` and `turbomcp-auth`.
auth = []
jwt-validation = []

# Observability
metrics = ["dep:metrics"]

# Experimental features (pass-through to turbomcp-protocol)
experimental-tasks = ["turbomcp-protocol/experimental-tasks"]

# Development features
test-utils = ["dep:wiremock"]
