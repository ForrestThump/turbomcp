[package]
name = "turbomcp4-ext-tasks"
version = "4.0.0-alpha.1"
edition = "2024"
rust-version = "1.85"
authors = ["Nicholas Paterno <nick@epistates.com>"]
description = "TurboMCP v4 Tasks extension (io.modelcontextprotocol/tasks)."
license = "MIT"
repository = "https://github.com/Epistates/turbomcp"
homepage = "https://turbomcp.org"

[dependencies]
turbomcp4-core = { workspace = true, features = ["std"] }
turbomcp4-server = { workspace = true }
turbomcp4-service = { workspace = true }
turbomcp4-protocol = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "time"] }
time = { workspace = true, features = ["std", "formatting"] }
uuid = { workspace = true, features = ["v4"] }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "sync", "time"] }
tower = { workspace = true }
