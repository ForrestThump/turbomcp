[package]
name = "turbomcp-types"
version = "3.1.1"
edition = "2024"
rust-version = "1.89.0"
authors = ["Nicholas Paterno <nick@epistates.com>"]
description = "Core types for TurboMCP - the foundation of the MCP SDK"
license = "MIT"
repository = "https://github.com/Epistates/turbomcp"
homepage = "https://turbomcp.org"
documentation = "https://docs.rs/turbomcp-types"
keywords = ["mcp", "types", "protocol", "ai", "llm"]
categories = ["data-structures", "encoding"]
readme = "README.md"

[lib]
crate-type = ["rlib"]

[features]
default = ["std"]
# Standard library support (enables HashMap, better error handling)
std = ["serde/std", "serde_json/std"]
# Allocator support without full std (for no_std + alloc environments).
# Currently a no-op (`extern crate alloc;` is unconditional in src/lib.rs);
# kept so downstream `default-features = false, features = ["alloc"]`
# declarations continue to compile.
alloc = ["serde/alloc"]
# Tasks API (SEP-1686) - marked experimental in MCP 2025-11-25 spec.
# Currently a marker flag: `tasks` types are exposed unconditionally because
# they are part of the canonical 2025-11-25 type set. The flag exists so
# downstream crates can signal intent to use them; gating may be added later.
experimental-tasks = []

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[package.metadata.docs.rs]
all-features = true
