[package]
name = "turbomcp"
version = "4.0.0-alpha.1"
edition = "2024"
rust-version = "1.88"
authors = ["Nicholas Paterno <nick@epistates.com>"]
description = "Rust SDK for the Model Context Protocol (MCP): macro-driven servers and a typed client, dual protocol versions, stdio/HTTP/WebSocket transports, OAuth 2.1, OpenTelemetry."
readme = "README.md"
license = "MIT"
repository = "https://github.com/Epistates/turbomcp"
homepage = "https://turbomcp.org"
keywords = ["mcp", "model-context", "llm", "ai", "sdk"]
categories = ["network-programming", "asynchronous", "api-bindings"]

[features]
# stdio is the default transport and is always linked; http is opt-in.
default = []
# Also lights up the client's Streamable HTTP transport when `client` is on.
# (tokio: `run_http` spawns the graceful subscription-close watcher.)
http = ["dep:turbomcp-transport-http", "turbomcp-client?/http", "dep:tokio"]
# OAuth 2.1 resource-server auth (bearer validation, RFC 9728). Most useful
# with `http`; the metadata endpoint + challenges are HTTP-level.
auth = ["dep:turbomcp-auth"]
# The OAuth 2.1 *client* flow (authorization-code + PKCE, discovery,
# registration, refresh) under `turbomcp::auth::client`. Implies `auth`.
client-oauth = ["auth", "turbomcp-auth/oauth-client"]
# OpenTelemetry observability: the TraceContextLayer + W3C propagation +
# redaction. Add `otlp` (on the telemetry crate) for the export pipeline.
telemetry = ["dep:turbomcp-telemetry"]
# WebSocket transport (bidirectional, non-spec convenience). Server + client.
websocket = ["dep:turbomcp-transport-ws"]
# The MCP client (ClientBuilder, ConnectMode probe, typed neutral API). The
# other half of the protocol; opt-in for server-only users.
client = ["dep:turbomcp-client"]
# The draft Tasks extension (io.modelcontextprotocol/tasks, SEP-2663):
# resultType:"task" augmentation, tasks/get|update|cancel, notifications/tasks.
ext-tasks = ["dep:turbomcp-ext-tasks"]
# SIMD-accelerated JSON (sonic-rs) as the DefaultCodec on native
# x86_64/aarch64. Off by default: serde_json is the portable baseline.
simd = ["turbomcp-codec/simd"]

[dependencies]
turbomcp-core = { workspace = true }
turbomcp-protocol = { workspace = true }
turbomcp-codec = { workspace = true }
turbomcp-service = { workspace = true }
turbomcp-server = { workspace = true }
turbomcp-transport-stdio = { workspace = true }
turbomcp-transport-http = { workspace = true, optional = true }
turbomcp-transport-ws = { workspace = true, optional = true }
turbomcp-auth = { workspace = true, optional = true }
turbomcp-telemetry = { workspace = true, optional = true }
turbomcp-client = { workspace = true, optional = true }
turbomcp-ext-tasks = { workspace = true, optional = true }
turbomcp-macros = { workspace = true }
# `run_http` spawns the graceful subscription-close watcher (feature `http`).
tokio = { workspace = true, features = ["rt"], optional = true }

# Re-exported for `#[server]`-generated code (schema derivation + (de)serialization).
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = [
    "macros",
    "rt",
    "rt-multi-thread",
    "io-util",
    "time",
] }
insta = { workspace = true }
trybuild = { workspace = true }
criterion = { workspace = true, features = ["async_tokio"] }
tower = { workspace = true, features = ["util"] }
axum = { workspace = true }
http-body-util = "0.1"
reqwest = { workspace = true }
turbomcp-transport-stdio = { workspace = true }

[lib]
doctest = false

[[example]]
name = "hello_world"

[[example]]
name = "calculator"

[[example]]
name = "stateful"

[[example]]
name = "validation"

[[example]]
name = "resources_prompts"

[[example]]
name = "structured_output"

[[example]]
name = "dual_transport"
required-features = ["http"]

[[example]]
name = "elicitation"

[[example]]
name = "tasks"
required-features = ["ext-tasks"]

[[bench]]
name = "dispatch"
harness = false

[package.metadata.docs.rs]
all-features = true
