[package]
name = "turbomcp4"
version = "4.0.0-alpha.1"
edition = "2024"
rust-version = "1.85"
authors = ["Nicholas Paterno <nick@epistates.com>"]
description = "TurboMCP v4 SDK facade: re-exports + prelude."
readme = "README.md"
license = "MIT"
repository = "https://github.com/Epistates/turbomcp"
homepage = "https://turbomcp.org"

[features]
# stdio is the default transport and is always linked; http is opt-in.
default = []
# Also lights up the client's Streamable HTTP transport when `client` is on.
http = ["dep:turbomcp4-transport-http", "turbomcp4-client?/http"]
# OAuth 2.1 resource-server auth (bearer validation, RFC 9728). Most useful
# with `http`; the metadata endpoint + challenges are HTTP-level.
auth = ["dep:turbomcp4-auth"]
# OpenTelemetry observability: the TraceContextLayer + W3C propagation +
# redaction. Add `otlp` (on the telemetry crate) for the export pipeline.
telemetry = ["dep:turbomcp4-telemetry"]
# The MCP client (ClientBuilder, ConnectMode probe, typed neutral API). The
# other half of the protocol; opt-in for server-only users.
client = ["dep:turbomcp4-client"]
# The draft Tasks extension (io.modelcontextprotocol/tasks, SEP-2663):
# resultType:"task" augmentation, tasks/get|update|cancel, notifications/tasks.
ext-tasks = ["dep:turbomcp4-ext-tasks"]

[dependencies]
turbomcp4-core = { workspace = true }
turbomcp4-protocol = { workspace = true }
turbomcp4-codec = { workspace = true }
turbomcp4-service = { workspace = true }
turbomcp4-server = { workspace = true }
turbomcp4-transport-stdio = { workspace = true }
turbomcp4-transport-http = { workspace = true, optional = true }
turbomcp4-auth = { workspace = true, optional = true }
turbomcp4-telemetry = { workspace = true, optional = true }
turbomcp4-client = { workspace = true, optional = true }
turbomcp4-ext-tasks = { workspace = true, optional = true }
turbomcp4-macros = { workspace = true }

# Re-exported for `#[server]`-generated code (schema derivation + (de)serialization).
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = [
    "macros",
    "rt",
    "rt-multi-thread",
    "io-util",
    "time",
] }
insta = { workspace = true }
tower = { workspace = true, features = ["util"] }
axum = { workspace = true }
http-body-util = "0.1"
reqwest = { workspace = true }
turbomcp4-transport-stdio = { workspace = true }

[lib]
doctest = false

[[example]]
name = "hello_world"

[[example]]
name = "calculator"

[[example]]
name = "stateful"

[[example]]
name = "validation"

[[example]]
name = "resources_prompts"

[[example]]
name = "dual_transport"
required-features = ["http"]

[[example]]
name = "elicitation"

[[example]]
name = "tasks"
required-features = ["ext-tasks"]
