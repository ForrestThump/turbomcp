[package]
name = "turbomcp4"
version = "4.0.0-alpha.1"
edition = "2024"
rust-version = "1.85"
authors = ["Nicholas Paterno <nick@epistates.com>"]
description = "TurboMCP v4 SDK facade: re-exports + prelude."
license = "MIT"
repository = "https://github.com/Epistates/turbomcp"
homepage = "https://turbomcp.org"

[features]
# stdio is the default transport and is always linked; http is opt-in.
default = []
http = ["dep:turbomcp4-transport-http"]
# OAuth 2.1 resource-server auth (bearer validation, RFC 9728). Most useful
# with `http`; the metadata endpoint + challenges are HTTP-level.
auth = ["dep:turbomcp4-auth"]

[dependencies]
turbomcp4-core = { workspace = true }
turbomcp4-protocol = { workspace = true }
turbomcp4-codec = { workspace = true }
turbomcp4-service = { workspace = true }
turbomcp4-server = { workspace = true }
turbomcp4-transport-stdio = { workspace = true }
turbomcp4-transport-http = { workspace = true, optional = true }
turbomcp4-auth = { workspace = true, optional = true }
turbomcp4-macros = { workspace = true }

# Re-exported for `#[server]`-generated code (schema derivation + (de)serialization).
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = [
    "macros",
    "rt",
    "rt-multi-thread",
    "io-util",
    "time",
] }
insta = { workspace = true }
tower = { workspace = true, features = ["util"] }
axum = { workspace = true }
http-body-util = "0.1"

[lib]
doctest = false

[[example]]
name = "hello_world"

[[example]]
name = "dual_transport"
required-features = ["http"]

[[example]]
name = "elicitation"
