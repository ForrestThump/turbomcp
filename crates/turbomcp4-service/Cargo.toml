[package]
name = "turbomcp4-service"
version = "4.0.0-alpha.1"
edition = "2024"
rust-version = "1.85"
authors = ["Nicholas Paterno <nick@epistates.com>"]
description = "TurboMCP v4 service layer: McpService, Transport trait, shared RPC middleware."
license = "MIT"
repository = "https://github.com/Epistates/turbomcp"
homepage = "https://turbomcp.org"

[dependencies]
turbomcp4-core = { workspace = true }
turbomcp4-codec = { workspace = true }
tower = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
futures = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
